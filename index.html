<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор грузоперевозок</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Наши стили -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h1>🚚 Калькулятор грузоперевозок</h1>
            <p>Введите адреса погрузки и выгрузки или выберите точки на карте</p>
        </div>
        <div class="card-body">
            <div id="resultAlert" class="alert" style="display: none;"></div>

            <!-- Точка А (погрузка) -->
            <div class="settings-form">
                <div class="settings-title">📦 Погрузка (Откуда)</div>
                <div class="form-group">
                    <label>📍 Адрес</label>
                    <input type="text" id="from-address" placeholder="Например: Москва, Тверская улица, 1" value="Москва, Тверская улица">
                </div>
                <div class="coord-row" style="margin-top: 10px;">
                    <div class="form-group">
                        <label>Широта (заполнится автоматически)</label>
                        <input type="text" id="from-lat" placeholder="Авто" readonly style="background-color: #f5f5f5;">
                    </div>
                    <div class="form-group">
                        <label>Долгота (заполнится автоматически)</label>
                        <input type="text" id="from-lon" placeholder="Авто" readonly style="background-color: #f5f5f5;">
                    </div>
                </div>
                <button type="button" class="btn btn-secondary" id="geocode-from-btn" style="margin-top: 10px; padding: 8px 16px; font-size: 14px;">
                    🔍 Найти координаты
                </button>
            </div>

            <!-- Точка Б (выгрузка) -->
            <div class="settings-form">
                <div class="settings-title">🏁 Выгрузка (Куда)</div>
                <div class="form-group">
                    <label>📍 Адрес</label>
                    <input type="text" id="to-address" placeholder="Например: Москва, Петровка улица, 38" value="Москва, Петровка улица">
                </div>
                <div class="coord-row" style="margin-top: 10px;">
                    <div class="form-group">
                        <label>Широта (заполнится автоматически)</label>
                        <input type="text" id="to-lat" placeholder="Авто" readonly style="background-color: #f5f5f5;">
                    </div>
                    <div class="form-group">
                        <label>Долгота (заполнится автоматически)</label>
                        <input type="text" id="to-lon" placeholder="Авто" readonly style="background-color: #f5f5f5;">
                    </div>
                </div>
                <button type="button" class="btn btn-secondary" id="geocode-to-btn" style="margin-top: 10px; padding: 8px 16px; font-size: 14px;">
                    🔍 Найти координаты
                </button>
            </div>

            <!-- Карта -->
            <div id="map"></div>

            <!-- Кнопка расчёта -->
            <button class="btn btn-primary btn-block" id="calcBtn" style="margin-top: 20px;">
                🧮 Рассчитать стоимость
            </button>

            <!-- Результат -->
            <div class="result-card" id="result">
                <h3>💰 Стоимость доставки</h3>
                <div class="result-price">— ₽</div>
                <div class="result-distance">Введите адреса и нажмите «Рассчитать»</div>
            </div>
        </div>
    </div>

    <!-- Ссылка на админку -->
    <div style="text-align: center; margin-top: 10px;">
        <a href="admin.html" style="color: white; text-decoration: none; opacity: 0.5; font-size: 12px;">🔧 Админ-панель</a>
    </div>
</div>

<!-- Наши скрипты -->
<script src="js/common.js"></script>
<script src="js/index.js"></script>
</body>
</html>
