<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Калькулятор грузоперевозок</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container" style="max-width: 800px;">
    <div class="card">
        <div class="card-header">
            <h1>⚙️ Админ-панель</h1>
            <p>Управление настройками маршрутов</p>
        </div>
        <div class="card-body">
            <div id="adminAlert" class="alert" style="display: none;"></div>

            <div id="settingsContainer" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        👤 <span id="userEmail"></span>
                    </div>
                    <button class="btn btn-danger" id="logoutBtn" style="padding: 8px 16px; font-size: 14px;">
                        🚪 Выйти
                    </button>
                </div>

                <form id="settingsForm">
                    <!-- Стартовая точка -->
                    <div class="settings-form">
                        <div class="settings-title">🏠 Стартовая точка (дом исполнителя)</div>
                        <div class="coord-row">
                            <div class="form-group">
                                <label>Широта</label>
                                <input type="text" id="start-lat" required>
                            </div>
                            <div class="form-group">
                                <label>Долгота</label>
                                <input type="text" id="start-lon" required>
                            </div>
                        </div>
                    </div>

                    <!-- Конечная точка -->
                    <div class="settings-form">
                        <div class="settings-title">🏁 Конечная точка (возврат после доставки)</div>
                        <div class="coord-row">
                            <div class="form-group">
                                <label>Широта</label>
                                <input type="text" id="finish-lat" required>
                            </div>
                            <div class="form-group">
                                <label>Долгота</label>
                                <input type="text" id="finish-lon" required>
                            </div>
                        </div>
                    </div>

                    <!-- Тариф -->
                    <div class="settings-form">
                        <div class="settings-title">💰 Тариф</div>
                        <div class="form-group">
                            <label>Стоимость за километр (₽)</label>
                            <input type="number" id="tariff" required step="1" min="0">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="saveBtn">
                        💾 Сохранить настройки
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" style="color: white; text-decoration: none; opacity: 0.7;">← На главную</a>
    </div>
</div>

<script src="js/common.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
